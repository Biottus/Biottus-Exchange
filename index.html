<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIOTTUS EXCHANGE | Pro Trading Terminal</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #181a20;
            --card-2: #12161c;
            --border: #2b3139;
            --text: #eaecef;
            --text-2: #848e9c;
            --gold: #f0b90b;
            --gold-glow: rgba(240,185,11,0.25);
            --green: #0ecb81;
            --red: #f6465d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* HEADER + 3D LOGO */
        .navbar { background: var(--card-2); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo-wrapper { display: flex; align-items: center; cursor: pointer; gap: 10px; }
        .pro-logo { 
            width: 38px; height: 38px; border-radius: 50%; 
            background: conic-gradient(from 180deg, #FFD700, #F0B90B, #D4AF37, #FFD700);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 20px; color: #000; 
            box-shadow: 0 4px 15px var(--gold-glow), inset 0 -2px 0 rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pro-logo:hover { transform: rotateY(180deg) scale(1.1); }
        .brand-name { font-size: 17px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .brand-name span { color: var(--gold); }
        .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* MAIN LAYOUT */
        .page-screen { display: none; padding: 16px; max-width: 520px; margin: 0 auto 75px; }
        .page-screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
        
        /* GLASS CARDS */
        .card { background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%); padding: 20px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .balance-title { font-size: 12px; color: var(--text-2); font-weight: 500; }
        .balance-amount { font-size: 34px; font-weight: 800; margin-top: 6px; letter-spacing: -1px; }
        .balance-pnl { font-size: 13px; font-weight: 700; margin-top: 8px; display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; }
        .pnl-up { background: rgba(14,203,129,0.15); color: var(--green); }
        .pnl-down { background: rgba(246,70,93,0.15); color: var(--red); }
        .btn-primary { background: linear-gradient(135deg, #f3ba2f, var(--gold)); color: #000; font-weight: 800; font-size: 13px; border: none; padding: 12px 22px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        
        /* ACTION GRID */
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .grid-item { background: var(--card-2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px; text-align: center; cursor: pointer; transition: 0.2s; }
        .grid-item:active { transform: scale(0.92); background: var(--card); }
        .grid-icon { font-size: 22px; margin-bottom: 6px; }
        .grid-item p { font-size: 11px; font-weight: 600; margin: 0; color: var(--text-2); }
        
        /* CRYPTO LIST */
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .list-title { font-size: 15px; font-weight: 800; }
        .badge { background: rgba(240,185,11,0.1); color: var(--gold); font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(240,185,11,0.2); font-weight: 700; }
        .crypto-scroller { max-height: 500px; overflow-y: auto; }
        .crypto-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px; border-radius: 10px; transition: 0.2s; }
