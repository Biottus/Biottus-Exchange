<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Crypto Exchange Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">

    <!-- Navbar -->
    <nav class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-r from-amber-500 to-orange-600 p-2.5 rounded-xl shadow-lg shadow-orange-500/20">
                <i class="fa-solid fa-cubes text-xl text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-wider bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">CRYPTO<span class="text-amber-500">NEXT</span></span>
        </div>
        <div class="flex items-center space-x-6 text-sm font-medium text-gray-400">
            <a href="#" class="text-amber-500 hover:text-amber-400 transition">Market</a>
            <a href="#" class="hover:text-white transition">Exchange</a>
            <a href="#" class="hover:text-white transition">Wallet</a>
            <button class="bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold px-5 py-2 rounded-xl hover:opacity-90 transition shadow-md shadow-orange-500/10">Connect Wallet</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Left & Center: Market & Charts -->
        <div class="lg:col-span-2 space-y-8">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="stats-container">
                <!-- Live Loading Cards -->
                <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl animate-pulse h-32"></div>
                <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl animate-pulse h-32"></div>
                <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl animate-pulse h-32"></div>
            </div>

            <!-- Chart Section -->
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-lg font-bold text-gray-200">Market Overview</h2>
                        <p class="text-xs text-gray-500">Live 7-day price trend simulation</p>
                    </div>
                    <span class="text-xs bg-gray-800 text-gray-400 px-3 py-1.5 rounded-lg border border-gray-700">Live Updates</span>
                </div>
                <div class="h-72">
                    <canvas id="marketChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Right: Live Exchange Terminal -->
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl flex flex-col justify-between h-fit sticky top-28">
            <div>
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-right-left text-amber-500"></i> Quick Swap (Testnet)
                </h2>
                
                <!-- From Crypto -->
                <div class="bg-gray-950 border border-gray-800 p-4 rounded-xl mb-4">
                    <label class="text-xs text-gray-500 block mb-1">You Pay</label>
                    <div class="flex justify-between items-center">
                        <input type="number" id="swap-input" value="1" class="bg-transparent text-xl font-bold focus:outline-none text-white w-full" oninput="calculateSwap()">
                        <select class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none" id="from-coin" onchange="calculateSwap()">
                            <option value="bitcoin">BTC</option>
                            <option value="ethereum">ETH</option>
                        </select>
                    </div>
                </div>

                <!-- Swap Icon -->
                <div class="flex justify-center my-2">
                    <div class="bg-gray-800 p-2 rounded-full border border-gray-700 cursor-pointer hover:bg-gray-700 transition">
                        <i class="fa-solid fa-arrow-down-up-across-line text-amber-500 text-xs"></i>
                    </div>
                </div>

                <!-- To Fiat/Crypto -->
                <div class="bg-gray-950 border border-gray-800 p-4 rounded-xl mb-6">
                    <label class="text-xs text-gray-500 block mb-1">You Receive</label>
                    <div class="flex justify-between items-center">
                        <span id="swap-output" class="text-xl font-bold text-gray-400">Loading...</span>
                        <select class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none">
                            <option value="usd">USD ($)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold py-4 rounded-xl transition shadow-lg shadow-orange-500/10 hover:opacity-95" onclick="alert('Success! This is a demo swap transaction on testing environment.')">
                Execute Swap
            </button>
        </div>
    </main>

    <script>
        let currentPrices = {};

        async function fetchMarketData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=usd&include_24hr_change=true');
                const data = await response.json();
                currentPrices = data;
                
                renderStats(data);
                calculateSwap();
            } catch (error) {
                console.error("Error fetching crypto data:", error);
            }
        }

        function renderStats(data) {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';

            const coins = [
                { id: 'bitcoin', name: 'Bitcoin', symbol: 'BTC', icon: 'fa-bitcoin text-orange-500' },
                { id: 'ethereum', name: 'Ethereum', symbol: 'ETH', icon: 'fa-ethereum text-indigo-400' },
                { id: 'binancecoin', name: 'BNB', symbol: 'BNB', icon: 'fa-coins text-yellow-500' }
            ];

            coins.forEach(coin => {
                const price = data[coin.id].usd;
                const change = data[coin.id].usd_24h_change;
                const isPositive = change >= 0;

                container.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl hover:border-gray-700 transition">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center space-x-3">
                                <div class="bg-gray-950 p-2.5 rounded-xl border border-gray-800">
                                    <i class="fa-brands ${coin.icon} text-lg"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-sm text-gray-200">${coin.name}</h3>
                                    <span class="text-xs text-gray-500 font-mono">${coin.symbol}/USD</span>
                                </div>
                            </div>
                            <span class="text-xs font-semibold px-2 py-1 rounded-lg ${isPositive ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}">
                                ${isPositive ? '+' : ''}${change.toFixed(2)}%
                            </span>
                        </div>
                        <p class="text-2xl font-black font-mono tracking-tight text-white">$${price.toLocaleString()}</p>
                    </div>
                `;
            });
        }

        function calculateSwap() {
            const amount = document.getElementById('swap-input').value;
            const selectedCoin = document.getElementById('from-coin').value;
            const outputSpan = document.getElementById('swap-output');

            if (currentPrices[selectedCoin]) {
                const rate = currentPrices[selectedCoin].usd;
                const total = amount * rate;
                outputSpan.innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            }
        }

        // Initialize Chart.js
        const ctx = document.getElementById('marketChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Market Index',
                    data: [62000, 61500, 63000, 62800, 64200, 63900, 65000],
                    borderColor: '#f59e0b',
                    borderWidth: 2,
                    backgroundColor: 'rgba(245, 158, 11, 0.04)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7280' } },
                    y: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280' } }
                }
            }
        });

        fetchMarketData();
        setInterval(fetchMarketData, 30000); // Auto refresh every 30s
    </script>
</body>
</html>
