<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIOTTUS EXCHANGE</title>
<style>
body{margin:0;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
.header{background:#12161c;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2b3139;position:sticky;top:0;}
.logo{width:40px;height:40px;background:#f0b90b;color:#000;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
.title{font-size:20px;font-weight:800;} .title span{color:#f0b90b;}
.container{max-width:430px;margin:0 auto;padding:12px 12px 80px;}
.card{background:#181a20;border:1px solid #2b3139;border-radius:12px;padding:16px;margin-bottom:12px;}
.balance-title{font-size:12px;color:#848e9c;}
.balance{font-size:32px;font-weight:700;margin:6px 0;}
.pnl{font-size:13px;color:#0ecb81;font-weight:600;}
.btn{width:100%;background:#f0b90b;color:#000;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:14px;margin-top:12px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.grid-item{background:#1e2329;border:1px solid #2b3139;border-radius:10px;padding:16px 8px;text-align:center;font-size:13px;color:#848e9c;font-weight:600;}
.grid-item span{font-size:22px;display:block;margin-bottom:4px;}
.list-title{font-weight:700;font-size:15px;margin-bottom:12px;}
.item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #2b3139;}
.item:last-child{border:none;}
.coin-left{display:flex;align-items:center;gap:10px;}
.icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:12px;}
.pair{font-weight:600;font-size:14px;}
.name{font-size:11px;color:#848e9c;}
.price{text-align:right;}
.price-num{font-weight:600;font-size:15px;}
.change{display:inline-block;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700;margin-top:4px;}
.up{background:rgba(14,203,129,0.1);color:#0ecb81;}
.down{background:rgba(246,70,93,0.1);color:#f6465d;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#12161c;border-top:1px solid #2b3139;display:flex;max-width:430px;margin:0 auto;}
.nav-item{flex:1;text-align:center;padding:10px 0 8px;color:#848e9c;font-size:10px;}
.nav-item.active{color:#f0b90b;}
.nav-item span{font-size:22px;display:block;}
</style>
</head>

    <div class="logo">B</div>
    <div class="title">BIOTTUS <span>EXCHANGE</span></div>
</div>

        <button class="btn">Deposit</button>
    </div>

        <div class="grid">
