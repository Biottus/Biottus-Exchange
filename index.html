<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIOTTUS EXCHANGE</title>
<style>
body{margin:0;background:#0b0e11;color:#eaecef;font-family:Arial;}
.header{background:#12161c;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2b3139;}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#FFD700,#FFA500);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:20px;}
.title{font-size:20px;font-weight:800;} .title span{color:#f0b90b;}
.container{max-width:430px;margin:0 auto;padding:12px 12px 80px;}
.card{background:#181a20;border:1px solid #2b3139;border-radius:12px;padding:16px;margin-bottom:12px;}
.balance{font-size:32px;font-weight:700;margin:8px 0;}
.green{color:#0ecb81;font-weight:700;}
.btn{width:100%;background:#f0b90b;color:#000;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:14px;margin-top:12px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.grid-item{background:#1e2329;border:1px solid #2b3139;border-radius:10px;padding:16px 8px;text-align:center;font-size:13px;color:#848e9c;font-weight:600;}
.item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #2b3139;}
.item:last-child{border:none;}
.coin-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#12161c;border-top:1px solid #2b3139;display:flex;max-width:430px;margin:0 auto;}
.nav-item{flex:1;text-align:center;padding:10px 0 8px;color:#848e9c;font-size:10px;}
.nav-item.active{color:#f0b90b;}
.nav-item span{font-size:22px;display:block;}
</style>
</head>
<body>
<div class="header">
    <div class="logo">B</div>
    <div class="title">BIOTTUS <span>EXCHANGE</span></div>
</div>
<div class="container">
    <div class="card">
        <div style="font-size:12px;color:#848e9c;">Estimated Balance</div>
        <div class="balance">$24,592.84</div>
        <div class="green">+ $847.21 (+3.56%) Today</div>
        <button class="btn">Deposit</button>
    </div>
    <div class="card">
        <div class="grid">
            <div class="grid-item">📈<br>Trade</div>
            <div class="grid-item">📊<br>Futures</div>
            <div class="grid-item">🔄<br>Convert</div>
            <div class="grid-item">👛<br>Wallet</div>
        </div>
    </div>
    <div class="card">
        <div style="font-weight:700;margin-bottom:12px;font-size:15px;">Markets</div>
        <div class="item">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="coin-icon" style="background:#F7931A;">₿</div>
                <div><div style="font-weight:600;">BTC/USDT</div><div style="font-size:11px;color:#848e9c;">Bitcoin</div></div>
            </div>
            <div style="text-align:right;"><div style="font-weight:600;">66,450.50</div><div class="green">+3.54%</div></div>
        </div>
        <div class="item">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="coin-icon" style="background:#627EEA;">Ξ</div>
                <div><div style="font-weight:600;">ETH/USDT</div><div style="font-size:11px;color:#848e9c;">Ethereum</div></div>
            </div>
            <div style="text-align:right;"><div style="font-weight:600;">1,812.20</div><div class="green">+2.81%</div></div>
        </div>
        <div class="item">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="coin-icon" style="background:#F0B90B;">B</div>
                <div><div style="font-weight:600;">BNB/USDT</div><div style="font-size:11px;color:#848e9c;">BNB</div></div>
            </div>
            <div style="text-align:right;"><div style="font-weight:600;">624.40</div><div class="green">+1.45%</div></div>
        </div>
        <div class="item">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="coin-icon" style="background:#14F195;">S</div>
                <div><div style="font-weight:600;">SOL/USDT</div><div style="font-size:11px;color:#848e9c;">Solana</div></div>
            </div>
            <div style="text-align:right;"><div style="font-weight:600;">145.30</div><div class="green">+8.92%</div></div>
        </div>
    </div>
</div>
<div class="nav">
    <div class="nav-item active"><span>🏠</span>Home</div>
    <div class="nav-item"><span>📊</span>Markets</div>
    <div class="nav-item"><span>📈</span>Trade</div>
    <div class="nav-item"><span>📉</span>Futures</div>
    <div class="nav-item"><span>👛</span>Assets</div>
</div>
</body>
</html>
