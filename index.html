<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>BIOTTUS V2 DEMO</title>
<style>
*{margin:0;box-sizing:border-box;}
body{background:#0b0e11;color:#eaecef;font-family:Arial;}
.h{background:#12161c;padding:16px 24px;border-bottom:1px solid #2b3139;position:sticky;top:0;z-index:100;}
.logo{display:inline-block;width:44px;height:44px;background:#f0b90b;color:#000;text-align:center;line-height:44px;font-weight:900;border-radius:8px;font-size:22px;}
.t{color:#f0b90b;font-size:22px;font-weight:800;display:inline-block;margin-left:12px;vertical-align:middle;}
.nav{display:inline-block;margin-left:40px;}
.nav a{color:#848e9c;text-decoration:none;font-weight:600;margin:0 15px;font-size:14px;padding:20px 0;}
.user{display:inline-block;float:right;color:#f0b90b;font-weight:600;padding:10px;cursor:pointer;}
.wrap{max-width:1400px;margin:20px auto;padding:0 20px;}
.l{float:left;width:65%;}
.r{float:right;width:33%;}
.c{background:#181a20;border:1px solid #2b3139;border-radius:12px;padding:20px;margin-bottom:16px;}
.b{font-size:40px;font-weight:700;margin:8px 0;}
.g{color:#0ecb81;font-weight:600;}
.red{color:#f6465d;}
.btn{background:#f0b90b;color:#000;border:none;width:100%;padding:14px;border-radius:8px;font-weight:700;margin-top:12px;font-size:16px;cursor:pointer;}
.btn-s{background:#0ecb81;}
.btn-b{background:#f6465d;}
.btn:disabled{background:#474d57;color:#848e9c;cursor:not-allowed;}
.page{display:none;}
.page:target{display:block;}
#home{display:block;}
body:not(:has(:target)) #home{display:block;}
.clear{clear:both;}
table{width:100%;border-collapse:collapse;}
td{padding:12px 0;border-bottom:1px solid #2b3139;}
.popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;}
.popup:target{display:flex;align-items:center;justify-content:center;}
.popc{background:#181a20;border:1px solid #2b3139;border-radius:12px;padding:24px;width:90%;max-width:400px;position:relative;}
.close{position:absolute;top:12px;right:16px;color:#848e9c;text-decoration:none;font-size:24px;}
.input{width:100%;padding:12px;background:#0b0e11;border:1px solid #2b3139;border-radius:8px;color:#eaecef;margin:8px 0;}
.tabs{display:flex;border-bottom:1px solid #2b3139;margin-bottom:16px;}
.tab{padding:12px 20px;cursor:pointer;color:#848e9c;font-weight:600;}
.tab.active{color:#f0b90b;border-bottom:2px solid #f0b90b;}
.tradebox{display:none;}
.tradebox.active{display:block;}
.msg{padding:12px;background:#0ecb81;color:#000;border-radius:8px;margin:10px 0;text-align:center;font-weight:600;display:none;}
.msg.error{background:#f6465d;}
.msg.show{display:block;}
</style>
</head>
<body>
<div class="h">
<div class="logo">B</div>
<div class="t">BIOTTUS EXCHANGE</div>
<div class="nav">
<a href="#home">Home</a>
<a href="#trade">Trade</a>
<a href="#wallet">Wallet</a>
</div>
<div class="user" id="userBtn" onclick="toggleUser()">Login</div>
</div>

<div class="wrap">
<div id="home" class="page">
<div class="c">
<div style="font-size:12px;color:#848e9c;">Total Balance</div>
<div class="b" id="totalBal">$0.00</div>
<a href="#login" class="btn" id="depBtn">Login to Trade</a>
</div>
</div>

<div id="trade" class="page">
<div class="l">
<div class="c">
<div style="font-weight:700;margin-bottom:12px;font-size:18px;">BTC/USDT</div>
<div class="b" style="font-size:32px;">66,450.50</div>
<div class="g">+3.54% 24h</div>
</div>
</div>
<div class="r">
<div class="c">
<div class="tabs">
<div class="tab active" onclick="switchTab('buy')">Buy</div>
<div class="tab" onclick="switchTab('sell')">Sell</div>
</div>
<div class="msg" id="msg"></div>
<div id="buybox" class="tradebox active">
<div style="font-size:12px;color:#848e9c;margin-bottom:8px;">Available: <span id="usdtBal">0.00</span> USDT</div>
<input class="input" id="buyAmt" placeholder="Amount USDT" type="number">
<div style="font-size:12px;color:#848e9c;margin:8px 0;">≈ <span id="buyBtc">0.000000</span> BTC</div>
<button class="btn btn-s" onclick="doBuy()">Buy BTC</button>
</div>
<div id="sellbox" class="tradebox">
<div style="font-size:12px;color:#848e9c;margin-bottom:8px;">Available: <span id="btcBal">0.000000</span> BTC</div>
<input class="input" id="sellAmt" placeholder="Amount BTC" type="number">
<div style="font-size:12px;color:#848e9c;margin:8px 0;">≈ <span id="sellUsdt">0.00</span> USDT</div>
<button class="btn btn-b" onclick="doSell()">Sell BTC</button>
</div>
</div>
</div>
<div class="clear"></div>
</div>

<div id="wallet" class="page">
<div class="c" id="walletContent">
<div style="font-weight:700;margin-bottom:12px;font-size:18px;">My Assets</div>
<div style="color:#848e9c;">Please login first</div>
</div>
</div>
</div>

<div id="login" class="popup">
<div class="popc">
<a href="#" class="close">×</a>
<div style="font-size:20px;font-weight:700;margin-bottom:16px;text-align:center;">Login</div>
<input class="input" id="email" placeholder="demo@biottus.com" value="demo@biottus.com">
<input class="input" id="pass" type="password" placeholder="123456" value="123456">
<button class="btn" onclick="doLogin()">Log In</button>
</div>
</div>

<script>
let usdt=10000,btc=0,logged=false,price=66450.50;
function init(){
let d=localStorage.getItem('bio');
if(d){let j=JSON.parse(d);usdt=j.u;btc=j.b;logged=j.l;}
updateUI();
document.getElementById('buyAmt').oninput=calcBuy;
document.getElementById('sellAmt').oninput=calcSell;
}
function save(){localStorage.setItem('bio',JSON.stringify({u:usdt,b:btc,l:logged}));}
function updateUI(){
if(logged){
document.getElementById('userBtn').textContent='Demo User | Logout';
document.getElementById('depBtn').textContent='Go to Trade';
document.getElementById('depBtn').href='#trade';
document.getElementById('totalBal').textContent='$'+(usdt+btc*price).toFixed(2);
document.getElementById('usdtBal').textContent=usdt.toFixed(2);
document.getElementById('btcBal').textContent=btc.toFixed(6);
document.getElementById('walletContent').innerHTML='<div style="font-weight:700;margin-bottom:12px;font-size:18px;">My Assets</div><table><tr><td><b>USDT</b></td><td align="right">'+usdt.toFixed(2)+'</td></tr><tr><td><b>BTC</b></td><td align="right">'+btc.toFixed(6)+'</td></tr><tr><td><b>Total USD</b></td><td align="right" class="g">$'+(usdt+btc*price).toFixed(2)+'</td></tr></table>';
}else{
document.getElementById('userBtn').textContent='Login';
document.getElementById('totalBal').textContent='$0.00';
}}
function doLogin(){
if(document.getElementById('email').value=='demo@biottus.com'){
logged=true;save();updateUI();location='#home';
}else{alert('Use demo@biottus.com / 123456');}
}
function toggleUser(){
if(logged){logged=false;usdt=10000;btc=0;save();updateUI();location='#home';}
else{location='#login';}
}
function switchTab(t){
document.querySelectorAll('.tab').forEach(x=>x.className='tab');
document.querySelectorAll('.tradebox').forEach(x=>x.className='tradebox');
event.target.className='tab active';
document.getElementById(t+'box').className='tradebox active';
}
function calcBuy(){
let a=parseFloat(document.getElementById('buyAmt').value)||0;
document.getElementById('buyBtc').textContent=(a/price).toFixed(6);
}
function calcSell(){
let a=parseFloat(document.getElementById('sellAmt').value)||0;
document.getElementById('sellUsdt').textContent=(a*price).toFixed(2);
}
function showMsg(t,e){
let m=document.getElementById('msg');
m.textContent=t;m.className='msg show'+(e?' error':'');
setTimeout(()=>m.className='msg',3000);
}
function doBuy(){
if(!logged){location='#login';return;}
let a=parseFloat(document.getElementById('buyAmt').value)||0;
if(a<=0||a>usdt){showMsg('Insufficient USDT',1);return;}
let b=a/price;usdt-=a;btc+=b;save();updateUI();
document.getElementById('buyAmt').value='';calcBuy();
showMsg('Bought '+b.toFixed(6)+' BTC!');
}
function doSell(){
if(!logged){location='#login';return;}
let a=parseFloat(document.getElementById('sellAmt').value)||0;
if(a<=0||a>btc){showMsg('Insufficient BTC',1);return;}
let u=a*price;btc-=a;usdt+=u;save();updateUI();
document.getElementById('sellAmt').value='';calcSell();
showMsg('Sold '+a.toFixed(6)+' BTC!');
}
init();
</script>
</body>
</html>
