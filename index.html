<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIOTTUS EXCHANGE</title>
<style>
*{margin:0;box-sizing:border-box;}
body{background:#0b0e11;color:#eaecef;font-family:Arial;}
.h{background:#12161c;padding:16px 24px;border-bottom:1px solid #2b3139;position:sticky;top:0;z-index:100;}
.logo{display:inline-block;width:44px;height:44px;background:linear-gradient(135deg,#f0b90b,#f8d33a);color:#000;text-align:center;line-height:44px;font-weight:900;border-radius:8px;font-size:18px;box-shadow:0 2px 8px rgba(240,185,11,0.3);}
.t{color:#f0b90b;font-size:22px;font-weight:800;display:inline-block;margin-left:12px;vertical-align:middle;}
.nav{display:inline-block;margin-left:40px;}
.nav a{color:#848e9c;text-decoration:none;font-weight:600;margin:0 15px;font-size:14px;padding:20px 0;}
.nav a:hover{color:#fff;}
.user{display:inline-block;float:right;color:#f0b90b;font-weight:600;padding:10px;cursor:pointer;}
.wrap{max-width:1400px;margin:20px auto;padding:0 20px;}
.l{float:left;width:65%;}
.r{float:right;width:33%;}
.c{background:#181a20;border:1px solid #2b3139;border-radius:12px;padding:20px;margin-bottom:16px;}
.b{font-size:40px;font-weight:700;margin:8px 0;}
.g{color:#0ecb81;font-weight:600;}
.red{color:#f6465d;}
.btn{background:#f0b90b;color:#000;border:none;width:100%;padding:14px;border-radius:8px;font-weight:700;margin-top:12px;font-size:16px;cursor:pointer;}
.btn-s{background:#0ecb81;}
.btn-b{background:#f6465d;}
.btn:disabled{background:#474d57;color:#848e9c;cursor:not-allowed;}
.page{display:none;}
.page:target{display:block;}
#home{display:block;}
body:has(#trade:target) #home,body:has(#wallet:target) #home,body:has(#markets:target) #home{display:none;}
.clear{clear:both;}
table{width:100%;border-collapse:collapse;font-size:13px;}
td{padding:8px 0;border-bottom:1px solid #2b3139;}
tr:last-child td{border:none;}
tr:hover{background:#1e2329;cursor:pointer;}
.chart{width:100%;height:300px;background:#0b0e11;border-radius:8px;margin-top:12px;position:relative;overflow:hidden;}
.candle{position:absolute;bottom:20px;width:4px;background:#0ecb81;margin-left:1px;}
.candle.red{background:#f6465d;}
.popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;}
.popup:target{display:flex;align-items:center;justify-content:center;}
.popc{background:#181a20;border:1px solid #2b3139;border-radius:12px;padding:24px;width:90%;max-width:400px;position:relative;}
.close{position:absolute;top:12px;right:16px;color:#848e9c;text-decoration:none;font-size:24px;}
.input,.select{width:100%;padding:12px;background:#0b0e11;border:1px solid #2b3139;border-radius:8px;color:#eaecef;margin:8px 0;}
.select{cursor:pointer;}
.tabs{display:flex;border-bottom:1px solid #2b3139;margin-bottom:16px;}
.tab{padding:12px 20px;cursor:pointer;color:#848e9c;font-weight:600;}
.tab.active{color:#f0b90b;border-bottom:2px solid #f0b90b;}
.tradebox{display:none;}
.tradebox.active{display:block;}
.msg{padding:12px;background:#0ecb81;color:#000;border-radius:8px;margin:10px 0;text-align:center;font-weight:600;display:none;}
.msg.error{background:#f6465d;}
.msg.show{display:block;}
#home:target ~.h.nav a[href="#home"],
#trade:target ~.h.nav a[href="#trade"],
#wallet:target ~.h.nav a[href="#wallet"],
#markets:target ~.h.nav a[href="#markets"]{color:#f0b90b;border-bottom:2px solid #f0b90b;}
.coinrow{cursor:pointer;}
.coinrow:hover{background:#1e2329;}
.scroll{max-height:400px;overflow-y:auto;}
@media(max-width:900px){.l,.r{float:none;width:100%;}}
</style>
</head>
<body>
<div class="h">
<div class="logo">BX</div>
<div class="t">BIOTTUS EXCHANGE</div>
<div class="nav">
<a href="#home">Home</a>
<a href="#markets">Markets</a>
<a href="#trade">Trade</a>
<a href="#wallet">Wallet</a>
</div>
<div class="user" id="userBtn" onclick="toggleUser()">Login</div>
</div>

<div class="wrap">
<div id="home" class="page">
<div class="l">
<div class="c">
<div style="font-size:12px;color:#848e9c;">Total Balance</div>
<div class="b" id="totalBal">$0.00</div>
<div id="pnl" style="font-weight:600;">+ $0.00 (0.00%)</div>
<a href="#login" class="btn" id="depBtn">Login to Trade</a>
</div>
<div class="c">
<div style="font-weight:700;margin-bottom:12px;">BTC/USDT Chart - <span class="price g" id="btcprice">66,450.50</span></div>
<div class="chart" id="chart"></div>
</div>
</div>
<div class="r">
<div class="c">
<div style="font-weight:700;margin-bottom:12px;">Top Gainers</div>
<table id="gainers"></table>
</div>
</div>
<div class="clear"></div>
</div>

<div id="markets" class="page">
<div class="c">
<div style="font-weight:700;margin-bottom:12px;font-size:18px;">All Markets - 50 Coins</div>
<div class="scroll"><table id="marketsTable"></table></div>
</div>
</div>

<div id="trade" class="page">
<div class="l">
<div class="c">
<select class="select" id="coinSelect" onchange="changeCoin()"></select>
<div style="color:#848e9c;margin-top:12px;">Last Price</div>
<div class="b price" style="font-size:32px;" id="curPrice">0.00</div>
<div id="curChange" style="font-weight:600;">+0.00%</div>
<div class="chart" id="chart2"></div>
</div>
<div class="c">
<div style="font-weight:700;margin-bottom:12px;">Order History</div>
<table id="history"><tr><td style="color:#848e9c;">No trades yet</td></tr></table>
</div>
</div>
<div class="r">
<div class="c">
<div class="tabs">
<div class="tab active" onclick="switchTab('buy')">Buy</div>
<div class="tab" onclick="switchTab('sell')">Sell</div>
</div>
<div class="msg" id="msg"></div>
<div id="buybox" class="tradebox active">
<div style="font-size:12px;color:#848e9c;margin-bottom:8px;">Available: <span id="usdtBal">0.00</span> USDT</div>
<input class="input" id="buyAmt" placeholder="Amount USDT" type="number">
<div style="font-size:12px;color:#848e9c;margin:8px 0;">≈ <span id="buyCoin">0.000000</span> <span id="buySym">BTC</span></div>
<button class="btn btn-s" onclick="doBuy()">Buy <span id="buySym2">BTC</span></button>
</div>
<div id="sellbox" class="tradebox">
<div style="font-size:12px;color:#848e9c;margin-bottom:8px;">Available: <span id="coinBal">0.000000</span> <span id="sellSym">BTC</span></div>
<input class="input" id="sellAmt" placeholder="Amount" type="number">
<div style="font-size:12px;color:#848e9c;margin:8px 0;">≈ <span id="sellUsdt">0.00</span> USDT</div>
<button class="btn btn-b" onclick="doSell()">Sell <span id="sellSym2">BTC</span></
