<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIOTTUS EXCHANGE</title>
<style>
body{margin:0;background:#0b0e11;color:#eaecef;font-family:Arial;}
.header{background:#12161c;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2b3139;}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#FFD700,#D4AF37);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;}
.title{font-size:18px;font-weight:700;} .title span{color:#f0b90b;}
.container{max-width:430px;margin:0 auto;padding:12px;}
.card{background:#181a20;border:1px solid #2b3139;border-radius:12px;padding:16px;margin-bottom:12px;}
.balance{font-size:28px;font-weight:700;margin:8px 0;}
.item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2b3139;}
.green{color:#0ecb81;font-weight:700;}
</style>
</head>
<body>
<div class="header">
    <div class="logo">B</div>
    <div class="title">BIOTTUS <span>EXCHANGE</span></div>
</div>
<div class="container">
    <div class="card">
        <div style="font-size:12px;color:#848e9c;">Total Balance</div>
        <div class="balance">$24,592.84</div>
        <div class="green">+ $847.21 Today</div>
    </div>
    <div class="card">
        <div style="font-weight:700;margin-bottom:12px;">Markets</div>
        <div class="item"><div><b>BTC/USDT</b><br><span style="font-size:11px;color:#848e9c;">Bitcoin</span></div><div style="text-align:right;"><div>66,450.50</div><div class="green">+3.54%</div></div></div>
        <div class="item"><div><b>ETH/USDT</b><br><span style="font-size:11px;color:#848e9c;">Ethereum</span></div><div style="text-align:right;"><div>1,812.20</div><div class="green">+2.81%</div></div></div>
        <div class="item"><div><b>BNB/USDT</b><br><span style="font-size:11px;color:#848e9c;">BNB</span></div><div style="text-align:right;"><div>624.40</div><div class="green">+1.45%</div></div></div>
    </div>
</div>
</body>
</html>
